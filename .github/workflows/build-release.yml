name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            asset_name: apex-linux-x64
            rust_target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: darwin-arm64
            asset_name: apex-darwin-arm64
            rust_target: aarch64-apple-darwin
          - os: macos-13
            target: darwin-x64
            asset_name: apex-darwin-x64
            rust_target: x86_64-apple-darwin
          - os: windows-latest
            target: windows-x64
            asset_name: apex-windows-x64.exe
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies
        run: bun install

      - name: Build native addon (Rust)
        run: |
          cd packages/natives
          bun run build
          ls native/

      - name: Build binary
        run: |
          cd packages/coding-agent
          bun run build
        env:
          CROSS_TARGET: ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          cd packages/coding-agent/dist
          ls -la
          if [ -f "omp-${{ matrix.target }}" ]; then
            cp "omp-${{ matrix.target }}" "${{ matrix.asset_name }}"
          elif [ -f "omp" ]; then
            cp "omp" "${{ matrix.asset_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: packages/coding-agent/dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          generate_release_notes: true
