name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            asset_name: apex-linux-x64
            variant: modern
          - os: macos-latest
            target: darwin-arm64
            asset_name: apex-darwin-arm64
            variant: ""
          - os: windows-latest
            target: windows-x64
            asset_name: apex-windows-x64.exe
            variant: baseline

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: Install dependencies
        env:
          BUN_CONFIG_NO_MINIMUM_RELEASE_AGE: "1"
          SKIP_APEX_INSTALL: "1"
        run: bun install --no-frozen-lockfile

      - name: Create workspace symlinks
        shell: bash
        run: |
          mkdir -p node_modules/@oh-my-pi
          for pkg in packages/agent packages/ai packages/catalog packages/tui packages/natives packages/wire packages/utils packages/stats packages/mnemopi packages/hashline packages/snapcompact; do
            if [ -f "$pkg/package.json" ]; then
              name=$(cat $pkg/package.json | python3 -c "import sys,json; print(json.load(sys.stdin)['name'].split('/')[-1])")
              ln -sf "$(pwd)/$pkg" "node_modules/@oh-my-pi/$name" 2>/dev/null || true
            fi
          done
          ls node_modules/@oh-my-pi/

      - name: Install optional dependencies
        shell: bash
        env:
          BUN_CONFIG_NO_MINIMUM_RELEASE_AGE: "1"
          SKIP_APEX_INSTALL: "1"
        run: |
          cd packages/coding-agent
          bun add @huggingface/transformers mupdf --no-save 2>/dev/null || true

      - name: Build native addon (Rust)
        shell: bash
        env:
          TARGET_VARIANT: ${{ matrix.variant }}
          RUSTFLAGS: "-A dead_code -A unused"
        run: |
          cd packages/natives
          bun run build
          ls native/

      - name: Debug gen:native (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd packages/coding-agent
          bun --cwd=../natives run gen:native 2>&1 || true
          echo "=== after gen:native ==="
          ls ../natives/native/
          head -5 ../natives/native/embedded-addon.js

      - name: Build binary
        shell: bash
        env:
          TARGET_VARIANT: ${{ matrix.variant }}
          RUSTFLAGS: "-A dead_code -A unused"
        run: |
          cd packages/coding-agent
          bun run build

      - name: Debug embedded addon
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "=== native dir ==="
          ls packages/natives/native/
          echo "=== embedded-addon.js ==="
          head -30 packages/natives/native/embedded-addon.js

      - name: Rename artifact
        shell: bash
        run: |
          cd packages/coding-agent/dist
          ls -la
          for f in omp omp.exe omp-${{ matrix.target }} omp-${{ matrix.target }}.exe; do
            if [ -f "$f" ]; then
              cp "$f" "${{ matrix.asset_name }}"
              echo "Copied $f to ${{ matrix.asset_name }}"
              break
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: packages/coding-agent/dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
