name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            asset_name: apex-linux-x64
            variant: modern
          - os: macos-latest
            target: darwin-arm64
            asset_name: apex-darwin-arm64
            variant: ""
          - os: windows-latest
            target: windows-x64
            asset_name: apex-windows-x64.exe
            variant: modern

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: Install dependencies
        run: bun install

      - name: Build native addon (Rust)
        shell: bash
        env:
          TARGET_VARIANT: ${{ matrix.variant }}
        run: |
          cd packages/natives
          bun run build
          ls native/

      - name: Build binary
        shell: bash
        env:
          TARGET_VARIANT: ${{ matrix.variant }}
        run: |
          cd packages/coding-agent
          bun run build

      - name: Rename artifact
        shell: bash
        run: |
          cd packages/coding-agent/dist
          ls -la
          for f in omp omp.exe omp-${{ matrix.target }} omp-${{ matrix.target }}.exe; do
            if [ -f "$f" ]; then
              cp "$f" "${{ matrix.asset_name }}"
              echo "Copied $f to ${{ matrix.asset_name }}"
              break
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: packages/coding-agent/dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          generate_release_notes: true
