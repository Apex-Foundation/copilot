name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            asset_name: apex-linux-x64
          - os: macos-latest
            target: darwin-arm64
            asset_name: apex-darwin-arm64
          - os: macos-13
            target: darwin-x64
            asset_name: apex-darwin-x64
          - os: windows-latest
            target: windows-x64
            asset_name: apex-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          cd packages/coding-agent
          CROSS_TARGET=${{ matrix.target }} bun run build
        env:
          CROSS_TARGET: ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: packages/coding-agent/dist/omp-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          generate_release_notes: true
